name: Bicep Deploy

on:
  push:
    branches: [ main ]
    paths: [ 'infra/**' ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to dev
        run: |
          az deployment group create \
            --resource-group rg-bicep-lab-dev-uks-01 \
            --template-file infra/main.bicep \
            --parameters infra/environments/dev/main.bicepparam \
            --name deploy-dev-${{ github.run_id }}

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to prod
        run: |
          az deployment group create \
            --resource-group rg-bicep-lab-prod-uks-01 \
            --template-file infra/main.bicep \
            --parameters infra/environments/prod/main.bicepparam \
            --name deploy-prod-${{ github.run_id }}