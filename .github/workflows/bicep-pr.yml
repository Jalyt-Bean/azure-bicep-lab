name: Bicep PR Check

on:
  pull_request:
    branches: [ main ]
    paths: [ 'infra/**' ]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bicep Lint
        run: az bicep lint --file infra/main.bicep

      - name: Bicep Build
        run: az bicep build --file infra/main.bicep

  whatif:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - name: dev
            resource_group: rg-bicep-lab-dev-uks-01
          - name: prod
            resource_group: rg-bicep-lab-prod-uks-01
    environment: ${{ matrix.environment.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: What-If
        run: |
          az deployment group what-if \
            --resource-group ${{ matrix.environment.resource_group }} \
            --template-file infra/main.bicep \
            --parameters infra/environments/${{ matrix.environment.name }}/main.bicepparam \
            > whatif.txt 2>&1 || true
          cat whatif.txt

      - name: Read whatif output
        id: whatif-content
        run: |
          {
            echo 'content<<EOF'
            cat whatif.txt
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Post What-If to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: whatif-${{ matrix.environment.name }}
          message: |
            ### Azure What-If Preview — `${{ matrix.environment.name }}`
            **Resource group:** `${{ matrix.environment.resource_group }}`

            <details>
            <summary>Click to expand what-if output</summary>

            <pre>
            ${{ steps.whatif-content.outputs.content }}
            </pre>
            </details>