name: Bicep PR Check

on:
  pull_request:
    branches: [ main ]
    paths: [ 'infra/**' ]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  whatif:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep Lint
        run: az bicep lint --file infra/main.bicep

      - name: What-If
        run: |
          az deployment group what-if \
            --resource-group rg-bicep-lab-dev-uks-01 \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            > whatif.txt 2>&1 || true
          cat whatif.txt

      - name: Post What-If to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('whatif.txt', 'utf8');
            const truncated = output.length > 60000 ? output.substring(0, 60000) + '\n\n[Truncated]' : output;
            const body = `### Azure What-If Preview\n\n\`\`\`\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });